<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaterJobs</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <div class="header-brand">
          <img src="../assets/logo.png" alt="WaterJobs" class="header-logo" />
          <h1>WaterJobs</h1>
        </div>
        <div class="header-sites">
          <a href="https://www.indeed.com" target="_blank" rel="noopener" class="site-link" title="Indeed">
            <svg class="site-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </a>
          <a href="https://www.trabalhabrasil.com.br" target="_blank" rel="noopener" class="site-link" title="Trabalha Brasil">
            <svg class="site-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </a>
          <a href="https://www.workatastartup.com" target="_blank" rel="noopener" class="site-link" title="Work at a Startup">
            <svg class="site-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="controls">
        <button id="scanBtn" class="btn-primary">Scan Page</button>
        <div id="applyControls" style="display:none">
          <label class="select-all-label" id="selectAllLabel">
            <input type="checkbox" id="selectAllCheck" checked />
            <span id="selectAllText">Select All</span>
          </label>
          <button id="startBatchBtn" class="btn-primary btn-green">Start Batch — Open Jobs</button>
          <div id="batchStatus" class="batch-status" style="display:none">
            <span id="batchLabel"></span>
            <div class="batch-actions">
              <button id="skipBtn" class="btn-skip">Skip</button>
              <button id="stopBatch" class="btn-stop">Stop</button>
            </div>
          </div>
        </div>
        <span id="statusMessage"></span>
      </div>
      <div id="results">
        <p class="empty-state">Click "Scan Page" to find Easy Apply jobs.</p>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
